<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="ie=edge" />
        <title>NR Calculator</title>
        <link rel="stylesheet" href="/style.css" />
    </head>
    <body>
        <div class="h1"><h1>NR Calculator</h1></div>
        <div class="Calculator">
            <div id="sc"><h2 id="calcsc">6+9 = 69</h2></div>
            <div id="buttons">
                <input id="one" class="btns" type="button" value="1" />
                <input id="two" class="btns" type="button" value="2" />
                <input id="three" class="btns" type="button" value="3" />
                <input id="four" class="btns" type="button" value="4" />
                <input id="five" class="btns" type="button" value="5" />
                <input id="six" class="btns" type="button" value="6" />
                <input id="seven" class="btns" type="button" value="7" />
                <input id="eight" class="btns" type="button" value="8" />
                <input id="nine" class="btns" type="button" value="9" />
                <input id="zero" class="btns" type="button" value="0" />
                <input id="by" class="btns" type="button" value="×" />
                <input id="plus" class="btns" type="button" value="+" />
                <input id="minus" class="btns" type="button" value="-" />
                <input id="over" class="btns" type="button" value="÷" />
                <input id="equal" class="btns" type="button" value="=" />
                <input id="del" class="btns" type="button" value="del" />
            </div>
        </div>
        <script src="/script.js"></script>
    </body>
</html>
